<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>注册</title>
		<style>
body{
	display: flex;
	justify-content: center;
	align-items: center ;
	height: 95vh;
}
.center{
	height: 700px;
	width: 700px;
	background-color: white;
	display: flex;
	flex-direction: column;
	align-items: center;
	border: 1px solid #e0e0e0;
	box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
	border-radius: 5px;
}
.head-text{
	display: flex;
	gap: 10px;
	flex-direction: column;/*flex-direction 是说 主轴是垂直方向 一般默认是水平方向*/
	align-items: center; /* align-items 交叉轴，就是与主轴垂直的轴*/
}
.unit{
	color: blue;
}
.sub{
	color: blue;
	font-size: 25px;
}
.input-group{
	margin-bottom: 20px
}
.input-group label{
	display: block;
	margin-bottom: 8px;
}
.input-group input{
	width: 100%;
	padding: 12px 15px;
	border: 1px solid #dddddd53;
	border-radius: 4px;
	box-sizing: border-box;
}
.input-group input:focus{
	outline: none;
	border-color: #3498db;
}
.form-container{
	width: 80%;
}
.dl{
	width: 100%;
	padding :10px 20px;
	background-color: #3498db;
	color: white;
	font-size: 16px;
	border-radius: 4px;
	margin-top: 20px;
	outline: none;
	border: none;
	cursor: pointer;
}
.dl:hover{
	background-color: #2980b9;
}
.last{
	margin-top: 30px;
	margin-left: 210px;
	color: #166bb3;
	cursor: pointer;
}
.last a{
	text-decoration: none;
	color: #166bb3;
}
.last:hover{
	text-decoration: underline;
}
.last2{
	margin-top: 30px;
	margin-left: 235px;
	color: #166bb3;
	cursor: pointer;
}
.last2 a{
	text-decoration: none;
	color: #166bb3;
}
.last2:hover{
	text-decoration: underline;
}
.toast{
	position: fixed;
	top: 20px;
	right: 20px;
	background-color: #4CAF50;
	color: white;
	padding: 15px 25px;
	border-radius: 5px;
	box-shadow: 0 2px 10px rgba(0, 0, 0, 2);
	transform: translateX(120%);
	transition: transform 0.3s ease;
	z-index: 1000;
	max-width: 300px;
}
.toast.show{
	transform: translateX(0);
}
.toast.error{
	background-color: #f44336;
}
.toast.warning{
	background-color: #ff9800;
}
.toast.info{
	background-color: #2196F3;
}
		</style>
	</head>
	<body>
		<div class="center">
			<div class="head-text">
			<h1 class="unit">网络购物系统</h1>
			<p class="sub">用户注册</p>
			</div>
			<div class="form-container">
			<div class="input-group">
				<label>手机号</label>
				<input type="tel" id="phoneInput" name="new-phone" placeholder="请输入手机号" maxlength="11" autocomplete="new-phone">
			</div>
			<div class="input-group">
				<label>密码</label>
				<input type="password" id="passwordInput" name="new-password" placeholder="请设置密码" autocomplete="new-password">
			</div>
			<div>
				<button class="dl">注册</button>
			</div>
			<div class="last">
				<a href="login.html">已有账号？点击登录</a>
			</div>
			<div class="last2">
				<a href="login3.html">进入后台管理</a>
			</div>
			</div>
		</div>
		<div id="toastContainer"></div>
		<script>
    // 1. 校验手机号格式
    function checkPhone() {
        const phone = document.getElementById('phoneInput').value;
        const reg = /^1[3-9]\d{9}$/;
        return reg.test(phone);
    }

    // 2. 注册请求函数
    async function registerRequest(phone, password) {
        try {
            const response = await fetch('http://ggghhhyyy.xyz/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({phone, password})
            });
            
            if (!response.ok) {
                throw new Error('注册失败,状态码' + response.status);
            }
            
            return await response.json();
        } catch (error) {
            console.error('注册请求失败:', error);
            return {
                success: false,
                message: '注册失败: ' + (error.message || '网络错误')
            };
        }
    }

    // 3. Toast提示函数
    function showToast(message, type = 'success', duration = 3000) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        
        container.appendChild(toast);
        
        // 显示Toast
        setTimeout(() => toast.classList.add('show'), 10);
        
        // 自动消失
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => container.removeChild(toast), 300);
        }, duration);
        
        // 点击关闭
        toast.addEventListener('click', () => {
            toast.classList.remove('show');
            setTimeout(() => container.removeChild(toast), 300);
        });
    }

    // 4. 注册按钮点击事件 - 这是最重要的！
    const registerButton = document.querySelector('.dl');  // 获取注册按钮
    
    registerButton.addEventListener('click', async function() {
        console.log('注册按钮被点击了！');  // 调试用
        
        // 获取输入值
        const phone = document.getElementById('phoneInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        
        console.log('手机号:', phone, '密码:', password);  // 调试用
        
        // 验证手机号
        if (!checkPhone()) {
            showToast('请输入有效的11位手机号', 'warning');
            return;
        }
        
        // 验证密码
        if (!password) {
            showToast('请输入密码', 'warning');
            return;
        }
        
        if (password.length < 6) {
            showToast('密码长度至少6位', 'warning');
            return;
        }
        
        // 显示加载状态
        registerButton.disabled = true;
        registerButton.textContent = "注册中...";
        
        try {
            // 发送注册请求
            const result = await registerRequest(phone, password);
            console.log('注册结果:', result);  // 调试用
            
            // 处理结果
            if (result.success) {
                showToast('注册成功！正在跳转到登录页面...', 'success');
                // 延迟跳转，让用户看到提示
                setTimeout(() => {
                    window.location.href = "login.html"; // 跳转到登录页
                }, 1500);
            } else {
                showToast('注册失败：' + result.message, 'error');
            }
        } catch (error) {
            showToast('请求出错：' + error.message, 'error');
            console.error('注册出错:', error);
        } finally {
            // 恢复按钮状态
            registerButton.disabled = false;
            registerButton.textContent = "注册";
        }
    });

    // 5. "已有账号"链接 - 简单的跳转
    const loginLink = document.querySelector('.last');
    if (loginLink) {
        loginLink.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = "login.html";
        });
    }

    // 6. "进入后台管理"链接
    const adminLink = document.querySelector('.last2');
    if (adminLink) {
        adminLink.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = "login3.html";
        });
    }

    // 7. 按回车键也可以注册
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const phoneInput = document.getElementById('phoneInput');
            const passwordInput = document.getElementById('passwordInput');
            
            // 如果焦点在输入框中，按回车触发注册
            if (document.activeElement === phoneInput || 
                document.activeElement === passwordInput) {
                registerButton.click();
            }
        }
    });

    // 8. 测试Toast是否工作
    console.log('页面加载完成，可以测试Toast了');
    // 可以取消下面这行注释测试Toast是否正常
    // setTimeout(() => showToast('页面加载完成！', 'info'), 1000);
</script>
	</body>
</html>
